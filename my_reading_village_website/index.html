<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/webp"
      href="/assets/images/logos/my_reading_village_icon_cropped.webp"
    />
    <link
      rel="apple-touch-icon"
      href="/assets/images/logos/my_reading_village_icon_rounded.webp"
    />

    <!-- Primary SEO -->
    <title>
      My Reading Village — Turn Every Page Into a Cozy Village Adventure
    </title>
    <meta
      name="description"
      content="Turn every page you read into a cozy village full of adorable animal friends. My Reading Village is a free kawaii mobile game for book lovers — coming soon to Google Play."
    />
    <meta
      name="keywords"
      content="reading game, village builder, book tracker, kawaii game, cozy game, mobile game, reading habit, animal collector, Google Play, indie game"
    />
    <meta name="author" content="Fernando Pinto Villarroel" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://myreadingvillage.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://myreadingvillage.com/" />
    <meta
      property="og:title"
      content="My Reading Village — Turn Every Page Into a Cozy Village Adventure"
    />
    <meta
      property="og:description"
      content="Turn every page you read into a cozy village full of adorable animal friends. My Reading Village is a free kawaii mobile game — coming soon to Google Play."
    />
    <meta
      property="og:image"
      content="https://myreadingvillage.com/assets/images/backgrounds/marketing_banner_horizontal_1.webp"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="My Reading Village" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="My Reading Village — Turn Every Page Into a Cozy Village Adventure"
    />
    <meta
      name="twitter:description"
      content="Turn every page you read into a cozy village full of adorable animal friends. Free kawaii mobile game — coming soon to Google Play."
    />
    <meta
      name="twitter:image"
      content="https://myreadingvillage.com/assets/images/backgrounds/marketing_banner_horizontal_1.webp"
    />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "My Reading Village",
        "operatingSystem": "Android",
        "applicationCategory": "GameApplication",
        "genre": "Casual",
        "description": "Turn every page you read into a cozy village full of adorable animal friends. A free kawaii village-builder game that turns your reading habit into gameplay.",
        "url": "https://myreadingvillage.com/",
        "image": "https://myreadingvillage.com/assets/images/logos/my_reading_village_icon_rounded.webp",
        "screenshot": "https://myreadingvillage.com/assets/images/backgrounds/marketing_banner_horizontal_1.webp",
        "inLanguage": ["en", "es", "pt", "fr", "it"],
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "author": {
          "@type": "Person",
          "name": "Fernando Pinto Villarroel"
        }
      }
    </script>

    <!-- Google Fonts: Baloo 2 (headings) + Quicksand (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
